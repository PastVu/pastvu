name: Tagged Release

on:
  push:
    tags:
      - '*'
      - '!**-en'

permissions:
  contents: write

jobs:
  release:
    name: Tagged Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true

