name: Close stale pull requests

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/stale@v10
        with:
          # Only handle pull requests, leave issues untouched.
          days-before-issue-stale: -1
          days-before-issue-close: -1
